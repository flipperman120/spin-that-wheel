<!doctype html>
<html lang="en"><head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=Fraunces:wght@600;700&amp;display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
        body { font-family: 'DM Sans', sans-serif; }
        .spinner { width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#f59e0b;border-radius:50%;animation:spin .8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg) } }
        @keyframes fadeIn { from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)} }
        .fade-in { animation: fadeIn .4s ease both; }
    </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
 </head>
 <body data-template-id="__page-root" class="min-h-screen relative" style="background: linear-gradient(135deg, rgb(15, 23, 42), rgb(30, 58, 95));"><img data-template-id="page-bg-image" class="canva-image fixed inset-0 w-full h-full object-cover" loading="lazy" src="canva://MAFclW_EoaA/1" alt="Shadows of Leaves ">
  <div class="fixed inset-0 bg-black/40"></div>
  <div class="relative z-10">
   <header class="text-center px-4 pt-8 pb-4">
    <h1 data-template-id="app-title" class="canva-text" style="font-family: Fraunces, serif; color: rgb(255, 255, 255); font-weight: 400; font-style: normal; font-size: 133px;">Weather Checker</h1>
    <p data-template-id="app-subtitle" class="canva-text mt-1 mb-[30px]" style="color: rgb(255, 255, 255); font-weight: 400; font-style: normal; font-size: 26px;">Check current conditions anywhere</p>
   </header>
   <main class="max-w-xl mx-auto px-4 pb-12">
    <div data-template-id="search-section" class="canva-section rounded-2xl p-5 mb-6" style="background: rgba(30, 41, 59, 0.8);">
     <label data-template-id="search-label" class="canva-text block mb-2" for="city-input" style="color: rgb(255, 255, 255); font-weight: 400; font-style: normal; font-size: 24px;">Enter a city name</label>
     <form id="search-form" class="flex gap-2">
      <input data-template-id="search-input" id="city-input" type="text" class="canva-input flex-1 px-4 py-2.5 rounded-xl border border-gray-300 outline-none focus:ring-2 focus:ring-[#a5cfe6] bg-white/80" value="Sydney" placeholder="Search city..." style="color: rgb(30, 41, 59); font-weight: 400; font-style: normal; font-size: 16px;"> <button data-template-id="search-button" type="submit" class="canva-button px-5 py-2.5 rounded-xl font-medium transition hover:brightness-110" style="background: rgb(165, 207, 230); color: rgb(30, 41, 59); font-weight: 600; font-style: normal; font-size: 16px;">Search</button>
     </form>
    </div>
    <div id="empty-state" class="hidden text-center py-16">
     <div class="text-5xl mb-4">
      🌤️
     </div>
     <p data-template-id="empty-state-text" class="canva-text" style="color: rgb(100, 116, 139); font-weight: 400; font-style: normal; font-size: 16px;">Search for a city to see the weather</p>
    </div>
    <div id="loading-state" class="hidden flex justify-center py-16">
     <div class="spinner"></div>
    </div>
    <div id="error-state" class="hidden text-center py-16">
     <div class="text-5xl mb-4">
      😕
     </div>
     <p data-template-id="error-text" class="canva-text" style="color: rgb(248, 113, 113); font-weight: 400; font-style: normal; font-size: 16px;">City not found. Please try again.</p>
    </div>
    <div id="weather-content" class="hidden space-y-6 fade-in">
     <div data-template-id="current-section" class="canva-card rounded-2xl p-6" style="background: rgba(30, 41, 59, 0.8);">
      <h2 data-template-id="current-heading" class="canva-text mb-4" style="color: rgb(255, 255, 255); font-weight: 400; font-style: normal; font-size: 24px;">Current Weather</h2>
      <div id="current-city" class="text-lg font-medium text-white/90 mb-3"></div>
      <div class="flex items-center gap-4 mb-4">
       <span id="current-icon" class="text-6xl"></span>
       <div>
        <div id="current-temp" class="text-5xl font-bold text-white"></div>
        <div id="current-desc" class="text-white/80 mt-1"></div>
       </div>
      </div>
      <div class="grid grid-cols-3 gap-3 text-sm text-white/90">
       <div class="bg-white/15 rounded-xl p-3 text-center">
        <div class="text-xs opacity-70 mb-1">
         Feels like
        </div>
        <div id="current-feels" class="font-medium"></div>
       </div>
       <div class="bg-white/15 rounded-xl p-3 text-center">
        <div class="text-xs opacity-70 mb-1">
         Humidity
        </div>
        <div id="current-humidity" class="font-medium"></div>
       </div>
       <div class="bg-white/15 rounded-xl p-3 text-center">
        <div class="text-xs opacity-70 mb-1">
         Wind
        </div>
        <div id="current-wind" class="font-medium"></div>
       </div>
      </div>
     </div>
     <div>
      <h2 data-template-id="forecast-heading" class="canva-text mb-3" style="color: rgb(226, 232, 240); font-weight: 400; font-style: normal; font-size: 24px;">5-Day Forecast</h2>
      <div id="forecast-list" class="grid grid-cols-5 gap-2"></div>
     </div>
     <footer class="text-center pb-6 px-4">
      <p data-template-id="footer-text" class="canva-text" style="color: rgb(255, 255, 255); font-weight: 400; font-style: normal; font-size: 16px;">Powered by Open-Meteo</p>
     </footer>
    </div>
    <template id="forecast-card-template">
     <div data-template-id="forecast-card" class="canva-card rounded-xl p-3 text-center">
      <div class="forecast-day text-xs font-medium opacity-70 mb-1"></div>
      <div class="forecast-icon text-2xl my-1"></div>
      <div class="forecast-high text-sm font-bold"></div>
      <div class="forecast-low text-xs opacity-60"></div>
     </div>
    </template>
    <script src="/_sdk/editing_sdk.js"></script>
    <script>
        const WMO={0:['☀️','Clear sky'],1:['🌤️','Mainly clear'],2:['⛅','Partly cloudy'],3:['☁️','Overcast'],45:['🌫️','Fog'],48:['🌫️','Rime fog'],51:['🌦️','Light drizzle'],53:['🌦️','Drizzle'],55:['🌧️','Heavy drizzle'],61:['🌧️','Light rain'],63:['🌧️','Rain'],65:['🌧️','Heavy rain'],71:['🌨️','Light snow'],73:['🌨️','Snow'],75:['🌨️','Heavy snow'],77:['🌨️','Snow grains'],80:['🌦️','Light showers'],81:['🌧️','Showers'],82:['⛈️','Heavy showers'],85:['🌨️','Snow showers'],86:['🌨️','Heavy snow showers'],95:['⛈️','Thunderstorm'],96:['⛈️','Thunderstorm w/ hail'],99:['⛈️','Heavy hail']};
        function wmo(code){return WMO[code]||['🌡️','Unknown'];}
        const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

        function showState(id){['empty-state','loading-state','error-state','weather-content'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id));}

        async function searchCity(city){
            if(!city)return;
            showState('loading-state');
            try{
                const geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`).then(r=>r.json());
                if(!geo.results?.length){showState('error-state');return;}
                const{latitude:lat,longitude:lon,name}=geo.results[0];
                const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=5`).then(r=>r.json());
                const c=w.current;
                const[icon,desc]=wmo(c.weather_code);
                document.getElementById('current-city').textContent=name;
                document.getElementById('current-icon').textContent=icon;
                document.getElementById('current-temp').textContent=Math.round(c.temperature_2m)+'°C';
                document.getElementById('current-desc').textContent=desc;
                document.getElementById('current-feels').textContent=Math.round(c.apparent_temperature)+'°C';
                document.getElementById('current-humidity').textContent=c.relative_humidity_2m+'%';
                document.getElementById('current-wind').textContent=Math.round(c.wind_speed_10m)+' km/h';
                const fl=document.getElementById('forecast-list');
                fl.innerHTML='';
                const tpl=document.getElementById('forecast-card-template');
                w.daily.time.forEach((d,i)=>{
                    const card=tpl.content.cloneNode(true);
                    const[fi]=wmo(w.daily.weather_code[i]);
                    card.querySelector('.forecast-day').textContent=DAYS[new Date(d+'T00:00').getDay()];
                    card.querySelector('.forecast-icon').textContent=fi;
                    card.querySelector('.forecast-high').textContent=Math.round(w.daily.temperature_2m_max[i])+'°';
                    card.querySelector('.forecast-low').textContent=Math.round(w.daily.temperature_2m_min[i])+'°';
                    fl.appendChild(card);
                });
                const wc=document.getElementById('weather-content');
                wc.classList.remove('fade-in');
                void wc.offsetWidth;
                wc.classList.add('fade-in');
                showState('weather-content');
            }catch{showState('error-state');}
        }

        document.getElementById('search-form').addEventListener('submit',async e=>{
            e.preventDefault();
            const city=document.getElementById('city-input').value.trim();
            await searchCity(city);
        });

        window.addEventListener('DOMContentLoaded',async()=>{
            await searchCity('Sydney');
        });

        lucide.createIcons();
    </script>
   </main>
  </div>

</body></html>
